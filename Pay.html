<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complete Your Payment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f8f8;
      padding: 20px;
    }

    .box {
      max-width: 400px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #DCAC95;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Proceed To Secure Payment</h2>

    <p>Please enter the email you used to sign up.</p>

    <input type="email" id="email" placeholder="Your email address" required>

    <button onclick="pay()">Pay Now</button>
  </div>

<script>
function getProductDetails() {
  const params = new URLSearchParams(window.location.search);
  const productKey = params.get("product");

  const products = {
    ceo: {
      name: "The CEO Plan",
      amount: 5,
      return_url: "https://www.fuelthedreamhub.com/ftd-academy-thankyoud9caed62"
    },
    academy: {
      name: "Basic Academy Plan",
      amount: 5,
      return_url: "https://www.fuelthedreamhub.com/ftd-academy-thankyoud9caed62"
    },
    pricing: {
      name: "FTD Pricing System",
      amount: 5,
      return_url: "https://www.fuelthedreamhub.com/ftd-academy-thankyoud9caed62"
    },
    legal: {
      name: "Legal Essentials Template",
      amount: 5,
      return_url: "https://www.fuelthedreamhub.com/fashion-contract-thankyoud9caed62-20cc2159"
    },
    agreement: {
      name: "Designer Agreement Form",
      amount: 5,
      return_url: "https://www.fuelthedreamhub.com/fashion-contract-thankyoud9caed62-20cc2159"
    }
  };

  return products[productKey];
}

function pay() {
  const email = document.getElementById("email").value;

  if (!email) {
    alert("Please enter your email");
    return;
  }

  const product = getProductDetails();

  if (!product) {
    alert("Invalid product selected");
    return;
  }

  const payfastUrl =
    "https://www..payfast.co.za/eng/process" +
    "?cmd=_paynow" +
    "&receiver=32583549" +
    "&item_name=" + encodeURIComponent(product.name) +
    "&amount=" + product.amount +
    "&return_url=" + encodeURIComponent(product.return_url) +
    "&cancel_url=https://www.fuelthedreamhub.com/" +
    "&notify_url=https://hook.eu1.make.com/06udxf07wr3pfu3ve29h8gn44kxvbx8r" +
    "&custom_str1=" + encodeURIComponent(email) +
    "&custom_str2=" + encodeURIComponent(product.name) +
    "&email_address=" + encodeURIComponent(email);

  window.location.href = payfastUrl;
}
</script>

</body>
